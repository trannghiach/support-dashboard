version: "3.9"

services:
  db:
    image: postgres:16
    container_name: sd_db
    restart: always
    environment:
      POSTGRES_DB: SD_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sd_net

  backend:
    build: ./backend
    container_name: sd_backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    volumes:
    - ./backend/.env:/app/.env
    ports:
    - "8000:8000"
    networks:
      - sd_net

  frontend:
    build: ./frontend
    container_name: sd_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - sd_net
    
networks:
  sd_net:

volumes:
  postgres_data: